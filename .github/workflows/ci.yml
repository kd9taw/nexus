# Tempo CI — headless Rust workspace tests/clippy + the web UI build.
#
# Scope: Linux-hosted gates — the simulation-only Rust tests/clippy, the web UI
# build + Vitest, AND a Windows cross-COMPILE of the desktop app (compile/link
# only, to catch src-tauri breakage the Linux tests can't see). It does NOT bundle
# the NSIS installer or download the WebView2/Hamlib runtimes — that full packaging
# is produced out-of-band by scripts/build-windows.sh (native MSYS2 UCRT64),
# scripts/build-windows.ps1 (PowerShell wrapper), and scripts/build-windows-cross.sh
# (the same Linux/WSL2 cross toolchain, with --bundles nsis) — see WINDOWS.md.
# Published Windows binaries are cross-compiled beta and are not bundled here.
#
# Toolchain: the Rust jobs pin an exact stable (dtolnay/rust-toolchain@master with
# toolchain: 1.93.1) instead of floating @stable. A floating stable silently rolls
# rustfmt/clippy forward and reformats/re-lints the whole tree the day a new Rust
# ships — which is exactly what bit this repo. Bump the version below deliberately
# to adopt newer lints. The MSRV job intentionally stays pinned at 1.87.0.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger — also the diagnostic lever for "why has CI never run".
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Job 1 — Rust workspace: build the Fortran/C/C++ libft1 modem (via the
  # ft1-sys build.rs CMake project) and run the headless modem/engine/net/DX1
  # round-trip tests, then clippy across the whole workspace.
  test:
    name: Rust tests + clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # libft1 build deps. The native (host == target) CMake path locates the
      # FFTW3 single-precision library via pkg-config (`pkg_check_modules(FFTW3F
      # REQUIRED fftw3f)`) and Boost via `find_package(Boost REQUIRED)`:
      #   - gfortran        : the 4-CPM turbo modem is Fortran (gfortran runtime).
      #   - libfftw3-dev     : ships fftw3f.pc + libfftw3f + fftw3.f03 (FFTW3
      #                        SINGLE precision — used by four2a.f90 / fftw3 module).
      #   - libboost-dev     : ships <boost/crc.hpp> for the header-only CRC-14 in
      #                        crc14.cpp (find_package(Boost) config).
      #   - cmake, ninja-build : drive the libft1 CMake project.
      #   - pkg-config       : required by find_package(PkgConfig REQUIRED).
      - name: Install libft1 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gfortran \
            libfftw3-dev \
            libboost-dev \
            cmake \
            ninja-build \
            pkg-config \
            libasound2-dev \
            libudev-dev

      - name: Set up Rust 1.93.1 toolchain (pinned — see header)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
          components: clippy, rustfmt

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo test --workspace
        run: cargo test --workspace

      - name: cargo clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # The real-radio path (cpal audio + serial PTT) is feature-gated out of the
      # default build. Lint AND run its tests here — the Transport reconfig
      # decisions, the WSJT-X/PSK emit builders, and the rigctld round-trip — so
      # service.rs/device.rs can't silently rot or regress on the air.
      - name: cargo clippy tempo-audio --features device,serial
        run: cargo clippy -p tempo-audio --features device,serial --all-targets -- -D warnings

      - name: cargo test tempo-audio --features device,serial
        run: cargo test -p tempo-audio --features device,serial

  # Job 2 — Web UI (Vite + React + TypeScript). `npm run build` is `tsc -b &&
  # vite build`, so this also type-checks the DTO contract that mirrors
  # crates/tempo-app/src/dto.rs.
  ui:
    name: Web UI build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install UI dependencies
        run: npm --prefix ui ci

      - name: Build UI
        run: npm --prefix ui run build

      - name: Test UI (Vitest)
        run: npm --prefix ui test

      # Guardrail: no demo/mock/fabricated data may reach an operator. Greps the
      # Rust + TS sources AND the just-built UI bundle for the deleted demo/mock
      # fingerprints (propagation::demo, mockEngine, demoPropagation, …). Runs
      # after the build so it also proves the mock tree-shook out of dist/.
      - name: No demo/mock data guard
        run: bash scripts/check-no-demo.sh

  # Job 3 — MSRV: the workspace must compile on the pinned minimum toolchain
  # (Cargo.toml [workspace.package] rust-version = "1.87"). Build-only check,
  # incl. the propagation `live` feature (the heaviest dep set).
  msrv:
    name: MSRV (1.87) check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install libft1 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gfortran libfftw3-dev libboost-dev cmake ninja-build pkg-config

      - name: Set up Rust 1.87 toolchain
        uses: dtolnay/rust-toolchain@1.87.0

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-msrv-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-msrv-

      - name: cargo check --workspace (MSRV)
        run: cargo check --workspace --all-targets

      - name: cargo check propagation --features live (MSRV)
        run: cargo check -p propagation --features live

  # Job 4 — Supply chain: RustSec advisories, license allow-list, sources, bans.
  deny:
    name: cargo-deny (supply chain + licenses)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources licenses

  # Job 5 — Windows cross-compile. The desktop shell (src-tauri) is outside the
  # workspace and needs a WebView/MinGW toolchain the Linux test job lacks, so
  # `cargo test` never touches it. This job cross-compiles it to
  # x86_64-pc-windows-gnu with the MinGW-w64 toolchain — proving the Tauri command
  # surface, the feature-gated `radio` audio/CAT path, and the libft1 Fortran/C/C++
  # modem all still LINK for Windows. It is a compile/link check, not the shipping
  # installer: no NSIS bundle, no WebView2/Hamlib download (those run out-of-band
  # via scripts/build-windows-cross.sh, which adds --bundles nsis).
  windows-cross:
    name: Windows cross-compile (src-tauri)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # MinGW-w64 cross toolchain: gcc/g++/gfortran for the Fortran/C/C++ modem,
      # cmake/ninja to drive the libft1 CMake project, and a host build-essential
      # (cc/make) to cross-build FFTW3f for MinGW.
      - name: Install MinGW-w64 cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            gfortran-mingw-w64-x86-64 \
            libboost-dev \
            cmake \
            ninja-build \
            build-essential

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Rust 1.93.1 toolchain (pinned) + windows-gnu target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo, FFTW, and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            src-tauri/target
            target/fftw-mingw
          key: ${{ runner.os }}-wincross-${{ hashFiles('Cargo.lock', 'src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-wincross-

      # Cross-build FFTW3f for MinGW + the libft1 modem self-test exes (win_smoke,
      # roundtrip, …). Proves the native modem chain links for Windows and produces
      # target/fftw-mingw, which ft1-sys/build.rs reads on the src-tauri step below.
      - name: Cross-build FFTW + libft1 modem exes
        run: bash scripts/build-windows-cross.sh --no-gui

      # src-tauri embeds the web UI via the custom-protocol feature. `cargo build`
      # does NOT run Tauri's beforeBuildCommand, so build the dist explicitly first
      # or the asset embed fails ("frontendDist does not exist").
      - name: Build web UI (embedded assets)
        run: |
          npm --prefix ui ci
          npm --prefix ui run build

      # Compile/link the desktop app for Windows. NOT `cargo tauri build` — no NSIS
      # bundle, no WebView2/Hamlib download — just prove src-tauri compiles clean.
      - name: Cross-compile src-tauri (x86_64-pc-windows-gnu)
        env:
          FFTW_MINGW_PREFIX: ${{ github.workspace }}/target/fftw-mingw
        run: >
          cargo build --release
          --manifest-path src-tauri/Cargo.toml
          --target x86_64-pc-windows-gnu
          --features radio,custom-protocol

  # Job 6 — Raspberry Pi .deb, one per live Pi OS base. Runs on GitHub's hosted
  # arm64 runner (free for public repos), so the aarch64 build is NATIVE: the same
  # image under QEMU on a dev box takes 45+ minutes and is 5-20x slower.
  #
  # Two bases, not one: Pi OS moved to Trixie (Debian 13) in late 2025 while a large
  # installed base is still on Bookworm (12). Trixie bumps libc/GTK/webkit2gtk, so a
  # .deb built on one will not reliably install on the other. This is a BUILD MATRIX,
  # not a port — identical source, two runtimes.
  #
  # fail-fast is off deliberately: if Trixie breaks (its webkit is a different major
  # version) the Bookworm .deb — the one most users need — must still be produced.
  #
  # NOTE: a green build proves the .deb COMPILES and PACKAGES. It does not prove the
  # app RENDERS. The webview smoke test (waterfall, map/globe, Settings) still has to
  # run on real hardware before a base is called supported — see tasks/pi-trixie-plan.md.
  pi-deb:
    name: Raspberry Pi .deb (${{ matrix.base }})
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        base: [bookworm, trixie]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The DeepCW AI CW model is AGPL-3.0 (c) e04 and is NOT committed (15 MB binary,
      # gitignored — see src-tauri/resources/deepcw/README.md). A checkout therefore never
      # has it, and Tauri's resource glob matches the directory regardless, so without this
      # step the build silently produces a package ~14 MB lighter with no AI CW decoder and
      # no error. build-linux.sh hard-fails if these are absent, so this step is load-bearing.
      - name: Stage the DeepCW model (not committed — AGPL-3.0 (c) e04)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release download deepcw-model-v1 --repo "${{ github.repository }}" \
            --pattern 'model.onnx*' --dir src-tauri/resources/deepcw --clobber
          # Pin by digest: a silently-swapped model would change decode behaviour with no
          # other visible signal.
          echo "a7b3b4aa2610d3e88b8c7d4420eceee31be2d0ae595b3413264334f3ffb1eab5  src-tauri/resources/deepcw/model.onnx" | sha256sum -c -
          echo "b4342157b90229ee7380e165f3d8036179b80d1e6ae02f2557388b7fcd558c01  src-tauri/resources/deepcw/model.onnx.json" | sha256sum -c -

      # No QEMU/binfmt setup: the runner is already aarch64, so `--platform
      # linux/arm64` selects the native architecture and the container runs at
      # full speed. The Debian base image supplies every build dep, so nothing
      # is installed on the runner itself.
      #
      # The WSJT-X-derived modem source is vendored in-tree at libft1/vendor/wsjtx
      # and is CMake's default WX, so the checkout is self-contained — no external
      # tree to stage, which is what previously forced a dev-box path into the image.
      - name: Build .deb in a debian:${{ matrix.base }} container
        run: >
          docker buildx build
          --platform linux/arm64
          -f scripts/Dockerfile.pi
          --build-arg BASE=${{ matrix.base }}
          --progress=plain
          --target export
          --output type=local,dest=pi-out/${{ matrix.base }}
          .

      # tauri names BOTH bases' output Nexus_<ver>_arm64.deb. Publishing them
      # side by side without a suffix means one silently overwrites the other and
      # a tester has no way to tell which OS their download was built for.
      - name: Tag the artifact with its base, and verify it is genuinely arm64
        run: |
          set -euo pipefail
          deb=$(find pi-out/${{ matrix.base }} -name '*.deb' -print -quit)
          [ -n "$deb" ] || { echo "no .deb produced"; exit 1; }
          ver=$(dpkg-deb -f "$deb" Version)
          arch=$(dpkg-deb -f "$deb" Architecture)
          echo "package: $(dpkg-deb -f "$deb" Package) / $ver / $arch"
          [ "$arch" = "arm64" ] || { echo "expected arm64, got $arch"; exit 1; }
          # Prove the payload is really ARM — an x86 binary with an arm64 filename
          # installs cleanly and then fails to exec on the Pi.
          dpkg-deb -x "$deb" /tmp/debcheck
          bin=$(find /tmp/debcheck/usr/bin -type f -print -quit)
          file "$bin" | tee /tmp/filetype
          grep -q 'ARM aarch64' /tmp/filetype || { echo "payload is not ARM aarch64"; exit 1; }
          # Assert the AI CW model actually made it INTO the package. The staging step and
          # build-linux.sh both guard the inputs; this checks the output, because the failure
          # this catches (a package that installs and runs with the decoder silently absent)
          # is invisible to every other check. 2026-07-20: shipped exactly that, 14 MB light.
          m=/tmp/debcheck/usr/lib/Nexus/resources/deepcw/model.onnx
          [ -s "$m" ] || { echo "DeepCW model missing from the package"; exit 1; }
          echo "a7b3b4aa2610d3e88b8c7d4420eceee31be2d0ae595b3413264334f3ffb1eab5  $m" | sha256sum -c -
          mv "$deb" "pi-out/${{ matrix.base }}/Nexus_${ver}_arm64_${{ matrix.base }}.deb"
          sha256sum pi-out/${{ matrix.base }}/*.deb

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: nexus-pi-${{ matrix.base }}
          path: pi-out/${{ matrix.base }}/*.deb
          if-no-files-found: error
          retention-days: 30
