class = 1
size_bytes = 768008
reason = "WRITTEN only under `if(newdat)` (:23-29); READ unconditionally at :40 (`c1(k)=cx(i)`) on EVERY call. The write gate is a DUMMY argument that this routine itself clears at :28, so whether the buffer is refreshed is decided by CALLER-owned state, not by entry. Both callers hard-code a non-refresh path: ft8b.f90:140 and ft8_a7.f90:172 pass the literal .false., so the majority of calls consume a spectrum they did not compute. Contents = one chain's ENTIRE 192000-point wideband audio spectrum. If chain B refreshes it and chain A's next candidate reuses it, chain A downsamples chain B's audio at chain A's frequency and logs chain B's stations on chain A's band -- precisely the plausible-wrong-decode failure. It self-heals ONLY if every chain re-enters via ft8_cabi.f90:266/:351 (newdat=.true. per pass) with no interleave finer than a whole ft8_decode_frame; nothing in this file enforces that. nm: `b equiv.0.0` 0xbb808 = 768008 B .bss. Upholds first pass class 1."

