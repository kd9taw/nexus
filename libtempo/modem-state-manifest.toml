# =============================================================================================
# libtempo modem state manifest - AUTHORITATIVE
# =============================================================================================
#
# WHAT THIS IS
#   The complete, per-symbol classification of every module-scope / statically-allocated data
#   symbol in the vendored WSJT-X + FT1 Fortran under libtempo/vendor/wsjtx/lib/. The `file`
#   key of every [[symbol]] below is relative to that directory (so `ft8/ft8b.f90` means
#   libtempo/vendor/wsjtx/lib/ft8/ft8b.f90).
#
# WHY IT EXISTS
#   The decoders are 1990s-style Fortran: state lives in SAVE variables, DATA-initialized
#   locals, COMMON blocks, and - the part no grep finds - ordinary locals that gfortran spilled
#   into .bss because they exceed -fmax-stack-var-size. ALL of it is process-global. Two radio
#   chains decoding two different bands inside ONE process therefore share EVERY symbol in this
#   file unless the class-1 set is explicitly swapped at the decode() boundary.
#
#   The failure mode is not a crash. Chain A's callsign hash table, a7 replay list, IR-HARQ
#   slot buffer or cached wideband spectrum, consumed by chain B, produces a CRC-valid,
#   syntactically perfect, WRONG decode - logged, uploaded to LoTW/QRZ/ClubLog, and
#   indistinguishable after the fact from a real QSO. That is the entire reason this audit
#   exists, and it is why the tie-break rule is asymmetric: when the evidence is not decisive,
#   file the symbol class 1. A few bytes of memcpy against a fabricated QSO is not a trade.
#
# CLASSES
#   class 1 = PER-CHAIN   carries chain-specific data between calls; MUST be swapped
#   class 2 = INIT-ONCE   written once, content provably chain-independent; shareable
#   class 3 = SCRATCH     fully overwritten before read each call; shareable IF calls serialize
#   class 4 = CONSTANT    never written (PARAMETER or read-only DATA); shareable
#
# THE RULE (enforced, not advisory)
#   Every module-scope / statically-allocated data symbol in the vendored tree MUST appear here,
#   keyed by file:line. A vendor refresh that introduces a new one - or moves an existing one to
#   a new line - MUST classify it in this file. An unclassified symbol FAILS THE BUILD: the
#   manifest gate re-scans the tree, diffs the (file, line, name) key set against these tables,
#   and exits non-zero on any symbol it cannot find. Do not silence the gate by deleting rows;
#   re-key them. An unclassified symbol is, by default, a shared one - which is precisely the
#   bug class this manifest was written to prevent. (Gate not yet wired into CMake/CI - see the
#   implementer notes at the end of this file.)
#
# HOW THIS PASS DIFFERS FROM THE FIRST
#   The first pass (marked PARTIAL / do-not-build-from) died mid-run with 188 of 291 challenges
#   unexecuted, and - worse - could not attribute the results it did have, because 87 symbol
#   NAMES collide across files (`first` x23, `twopi` x11, `dt` x6, `icos7` x4, `one` x2, `cw`
#   x2 at 174 B and 580608 B in the same call chain). This pass was run BATCHED BY FILE GROUP
#   (six batches, listed below) and every verdict is KEYED BY file:line, never by name. Where a
#   name appears N times it now appears as N independent rows with N independent verdicts - and
#   several of those pairs genuinely disagree (tempofast_downsample.f90:47 `x` is class 1 while
#   tempofast_sync.f90:44 `x`, same source idiom, is class 3). Every row states whether it
#   upholds or OVERTURNS the first pass and why; sizes were re-measured against nm/size rather
#   than inferred from declarations.
#
# BATCHES (the file groups this pass was run in)
#   GROUP A - ft8 core: ft8b / ft8_downsample / sync8 / sync8d / subtractft8 / baseline /
#             get_spectrum_baseline / ft8apset
#   GROUP B - ft8 FEC: osd174_91 / bpdecode174_91 / decode174_91 / encode174_91(+_nocrc) /
#             get_crc14 / chkcrc14a
#   GROUP C - ft8 a7 + waveform + params: ft8_a7 / gen_ft8wave / genft8 / ft8_params / ft8_testmsg
#   GROUP D - ft4: ft4_decode / ft4_downsample / ft4_params / ft4_baseline / gen_ft4wave / genft4 /
#             get_ft4_bitmetrics / getcandidates4 / subtractft4 / sync4d
#   GROUP E - tempofast/FT1: tempofast_decode / tempofast_downsample / tempofast_sync /
#             gen_tempofastwave / gen_tempofast / ir_harq_combine / cpm_trellis /
#             matched_filter_bank / ldpc348_91 / turbo_decode_tempofast / tempofast_interleave /
#             tempofast_demod_bcjr / bcjr_cpm / tempofast_rv_detect / tempofast_params /
#             tempofast_test
#   GROUP F - shared 77bit/lib: packjt77 / packjt / pfx / four2a / fftw3mod / crc / timer_module /
#             indexx / polyfit / stateless leaf routines
#
# THE NUMBER THAT MATTERS
#   TOTAL CLASS-1 BYTES = 3,530,670 (3.37 MiB) of DISTINCT storage.
#   That is the per-chain context cost, and the whole two-radio design rests on it.
#   The 67 class-1 [[symbol]] rows sum to 3,821,000; the 290,330 B difference is deliberate
#   double-counting of shared storage addressed under two names (the ft4_downsample x/cx
#   EQUIVALENCE pair, 290,304 B, plus the two cross-file packjt77 write-site rows, 26 B).
#   See [summary] for the full breakdown.
# =============================================================================================


# =============================================================================================
# CLASS 1 - PER-CHAIN. THE MEMCPY SET.
# 67 symbols, 3,530,670 bytes of DISTINCT storage (rows sum to 3,821,000; see class_1_bytes_double_counted)
# ---------------------------------------------------------------------------------------------
# Carries chain-specific data ACROSS a call boundary: written on one call, read on a later
# one, with content that depends on which radio/band/QSO produced it. Shared between two
# chains this does not crash - it produces WELL-FORMED WRONG DECODES that pass CRC and get
# logged. Every symbol here must live in the per-chain context and be swapped at the
# decode() boundary. Rows with size_bytes = 0 are EQUIVALENCE aliases or cross-file write
# sites whose storage is counted once under the owning row - do not allocate them twice.
# =============================================================================================

# --- group A ---

