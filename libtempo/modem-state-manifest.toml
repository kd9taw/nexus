# =============================================================================================
# ---
# =============================================================================================
#
# ## Notes for the implementer
#
# **The class-1 total is 3,530,670 bytes (3.37 MiB), and 96% of it is four objects.**
# ir_harq_combine `slots` (2,134,000), ft8_downsample x/cx (768,008), ft4_downsample x/cx
# (290,312) and tempofast_downsample x/cx (192,008) are 3,384,328 of the 3,530,670. Everything
# else - every AP mask, every callsign hash table, every latch and cursor, both packjt77 hash
# tables and the whole a7 replay set - is 146,342 bytes. That shape decides the design: DO NOT
# memcpy 3.37 MiB per decode. Three of those four objects are FFT caches whose only purpose is
# to be reused across the candidate loop WITHIN one decode() call; none of them needs to survive
# the call. Two viable strategies, in order of preference:
#   (a) Per-chain contexts held as separate allocations, swapped by POINTER, not copied. The
#       Fortran side never learns; the C ABI layer rebinds a base pointer per chain. Cost per
#       swap is O(1); memory is 2 x 3.37 MiB.
#   (b) If pointer-swapping the Fortran statics is impractical, memcpy only the state that must
#       genuinely persist between decode() calls - slots (2,134,000), the a7 tables (36,020),
#       the packjt77 group (83,778), the AP caches and latches - and force the three FFT caches
#       to be recomputed by guaranteeing newdat/newdata/dobigfft is .true. on the first
#       downsample of every pass. That drops the per-swap copy to 2,280,342 B (~2.28 MB), and to
#       146,342 B (~143 KB) if IR-HARQ is given a per-chain slot pool instead of being copied.
#       146 KB per swap is cheap enough that (b) is a perfectly respectable answer.
# Either way, the swap point is a whole decode() call. Nothing in the Fortran enforces that; it
# holds today only because every Rust entry point serializes on tempo_fast_sys::MODEM_LOCK. If
# that lock is ever dropped for parallel chains, ~19 MB of class-3 scratch (sync8 `s` 2.86 MB,
# the /heap4/ and /heap8/ COMMONs, getcandidates4 `s`, gen_ft4wave `dphi`) becomes a live data
# race, and class 3 stops meaning 'safe'.
#
# **Symbols I am still not fully sure about - look here first when a bug appears.**
#   * `four2a.f90:26 aa` (class 3, 131,080 B). The only verdict in this file resting on an
#     empirically measured gfortran placement rather than a declaration. It is a plan-creation
#     scratch buffer that IS static, and its safety depends on chain B not entering the planning
#     branch between chain A's write (:71) and read (:91). That window is real at startup when
#     both chains warm up, and the `!$omp critical` meant to protect it is INERT because
#     libtempo is not compiled with -fopenmp. Wrap four2a in a mutex regardless of class.
#   * `tempofast_decode.f90:102 apbits` + `:79 mycall0/hiscall0` (filed class 1). The guard at
#     :271 re-compares the live callsign pair on every entry, so sharing is arguably correct
#     today. I filed them 1 as insurance because this is the machinery that fabricates
#     callsigns. If someone later 'optimizes' that guard, the class becomes load-bearing.
#   * `ft8/osd174_91.f90:378 inext` (upgraded 3->1, 4 bytes). Benign only because Fortran's
#     `.and.` short-circuit question never gets to matter - the partner `lastpat` is reset to -1
#     and ipat is provably >= 0. The safety argument lives in a DIFFERENT subroutine. 4 bytes.
#   * `ft8_a7.f90:14 jseq` and its off-group partner `ft8_cabi.f90:46 nutc0_a7`. nutc0_a7 is
#     outside the six file groups this pass covered and is class 1 for the same reason. It is
#     NOT in the tables above - audit ft8_cabi.f90, ft4_cabi.f90 and tempofast_cabi.f90 as a
#     seventh group before building the context. Splitting jseq from nutc0_a7 desynchronizes the
#     a7 slot rollover.
#   * `ft8/ft8_testmsg.f90:2 testmsg` is filed class 2 solely because THE FILE IS NOT IN THE
#     BUILD. Elements 49:75 are undefined even single-chain. If a vendor refresh adds it to
#     LIBTEMPO_SOURCES, re-audit immediately.
#   * Everything filed class 3 on the strength of 'gfortran left it on the stack'. c1 in
#     ft4_downsample sits 33,280 bytes under the 65,536-byte spill threshold; raising NMAX or
#     lowering NDOWN silently moves it into shared .bss and changes its class.
#
# **Live single-radio bugs found while classifying - these are wrong TODAY, with one radio.**
#   1. `tempofast/gen_tempofastwave.f90` latches its ENTIRE fsample-dependent block (pulse, dt,
#      nsps_real, npulse, dphi_peak, nramp_out) on the FIRST caller, and the callers disagree:
#      tempofast_cabi.f90:185 forwards the host rate (48000 on the TX path) while
#      tempofast_decode.f90:1160/:1266 hardcode 12000.0. Whichever runs first defines the
#      waveform for the life of the process. This is the highest-value fix in the file.
#   2. `ft4/gen_ft4wave.f90:10 dt` has the same first-caller-wins defect via the public C entry
#      ft4_gen_wave; masked today only because every production call site happens to pass 12000.
#   3. `ft4_decode.f90:352 napwid` is assigned inside `if(ipass .gt. 3)` but read at :416 on
#      every pass. The first evaluation in a process reads an undefined value, and that value
#      selects maxosd=3 vs 2 - i.e. it decides whether deep OSD runs. The assignment belongs
#      above the ipass loop. Same shape as `apmy_ru`/`aphis_fd` in ft4_decode.f90:56 and
#      tempofast_decode.f90:103: written only under the callsign-changed guard, read
#      unconditionally. Fix the guard; do not merely copy the bytes.
#   4. `ft8_a7`'s -99.0 end-of-list sentinel is READ at ft8_cabi.f90:353 but NEVER WRITTEN
#      anywhere (the roll zeroes to 0.0). The replay loop is bounded solely by ndec, which is
#      why msg0/f0/dt0/ndec must move as one atomic unit.
#   5. `four2a.f90` never resets nplan (the destroy path needs nfft<0 and no caller passes it),
#      so FFTW plans only accumulate toward the hard `stop 'Too many FFTW plans requested.'` at
#      :49 - and two chains roughly double the rate of approach.
#   6. `ft8/get_spectrum_baseline.f90:4 NF` is 93 where its own comment's formula gives 92,
#      which is why the j-loop must exit early and column 93 of `s` is never written. Harmless
#      today; it is a trap for anyone who 'fixes' the loop.
#   7. `ft8/get_spectrum_baseline.f90:8` declares the x/cx EQUIVALENCE pair 8 bytes UNDERSIZED
#      (x(NFFT1) against cx(0:NH1)); sync8.f90:12 declares the same pair correctly as
#      x(NFFT1+2). The compiler allocates the union so nothing breaks - until someone converts
#      these to explicit per-chain structs sized from the `x` declaration.
#   8. The manifest gate described under THE RULE does not exist yet. Wire it in alongside
#      scripts/check-no-demo.sh (the existing repo-gate precedent) and call it from
#      libtempo/CMakeLists.txt and CI before the next vendor refresh, or this file starts
#      rotting the day someone pulls upstream.
# =============================================================================================
