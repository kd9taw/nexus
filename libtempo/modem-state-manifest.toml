[[symbol]]
name = "inext"
file = "ft8/osd174_91.f90"
line = 378
class = 1
size_bytes = 4
reason = "UPGRADED 3->1. Implicitly-typed integer, no declaration line; exists only via `save lastpat,inext` (:378). nm: `b inext.2`, 4 bytes. It is the linked-list cursor for the fetchit91 chain walk. Written at :396/:400/:404; READ at :397 (`lastpat.eq.ipat .and. inext.gt.0`) and :400. Unlike its partner `lastpat`, inext is NOT in the reset block (:380-383 resets ONLY lastpat), so on the first fetchit91 call of every osd174_91 invocation it still holds the PREVIOUS invocation's (previous chain's) value. It therefore fails the literal class-3 predicate: it is read before being written on entry. The leak is currently benign, and I can prove it: reset forces lastpat=-1 at :381, and ipat (:385-390, a sum of ishft(1,ntau-i)) is provably >=0, so `lastpat.eq.ipat` is always .false. on the first call, making the `.and.` false regardless of the stale inext, and the branch body at :398-400 that would consume it unreachable. But Fortran does not mandate short-circuit `.and.`, so gfortran may genuinely load the stale value, and the safety rests on a non-local invariant in a DIFFERENT subroutine rather than on the symbol being overwritten. Textbook when-in-doubt: cost of per-chain is 4 bytes; cost of being wrong is a mis-walked index chain feeding a wrong-but-well-formed codeword to the CRC. Save/restore it as a pair with `lastpat`."

